name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: stockmachine-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: stockmachine-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App
        run: xcodebuild -workspace ios/stockmachinemobile.xcworkspace -scheme stockmachinemobile -configuration Release -sdk iphonesimulator -derivedDataPath build

      - name: Upload App Archive
        uses: actions/upload-artifact@v4
        with:
          name: stockmachinemobile-ios-build
          path: stockmachine-mobile/ios/build
